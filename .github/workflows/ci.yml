name: CI (Testing & Linting)

# This workflow runs on every push to the main branch
# or whenever a Pull Request is opened.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Node.js Environment (Default for React/Express) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci # Uses the lockfile for consistent installs

      - name: Run Tests
        run: npm test --if-present

